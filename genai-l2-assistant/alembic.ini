# Alembic configuration for GenAI L2 Support Assistant
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template for new migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

# sys.path prepends — enables `from app.xxx import ...` in migrations
prepend_sys_path = .

# Truncate long revision hashes in filenames
truncate_slug_length = 40

# Set to 'true' to run "revision" without connecting to the database
# revision_environment = false

# Set to 'true' to allow .hierarchyenv access to the .ini file's logging
# output_encoding = utf-8

# Database connection string.
# This is overridden at runtime by env.py which reads from app.config.
# The value here serves as a fallback for Alembic CLI when env.py
# cannot import the application config (e.g., during CI without DB).
sqlalchemy.url = postgresql://l2assistant:l2assistant@localhost:5432/l2assistant


[post_write_hooks]
# Run ruff format on generated migration files
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
